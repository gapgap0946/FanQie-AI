[meta]
name = "规则怪谈"
id = "rule_horror"
description = "以诡异规则为核心驱动力的恐怖悬疑题材"

[craft]
chapter_types = ["氛围章", "事件章", "揭示章", "过渡章", "回收章"]
fatigue_words = ["毛骨悚然", "不寒而栗", "浑身发冷", "头皮发麻", "鸡皮疙瘩", "心跳加速", "仿佛", "不禁", "宛如", "竟然"]
numerical_system = false
power_scaling = false
era_research = false
pacing_rule = "氛围递进：安全感→微妙不适→确认异常→恐惧升级→高潮→喘息，循环推进"
satisfaction_types = ["真相揭示", "成功逃脱", "反杀怪物", "谜团解开", "规则发现"]

[craft.rules]
atmosphere = "氛围是第一生产力。用五感细节建立不安。恐怖来自对未知的恐惧，信息揭示要克制。"
pacing = "每5章必须打破一次已建立的模式（规则矛盾、可信来源说谎、安全区失效），避免机械重复。"
character = "被淘汰/伤害的配角必须至少有一个暗示其个人故事的细节，让淘汰有重量。"
language = "恐怖用事实传达，不用情绪标签。克制叙事：越恐怖越冷静。句子随恐惧升级而变短，但叙述者语气始终平稳。"

[craft.style_defaults]
avg_sentence_length = 25
avg_paragraph_length = 80

[craft.world_modules]
required = ["power_system", "geography", "history", "drive", "factions", "resources"]
extra = ["rule_system", "sanity_system"]

[craft.world_modules.emphasis]
power_system = "规则体系：规则的发现、验证、利用与打破"
drive = "对未知的恐惧与对真相的渴望之间的张力"
resources = "信息即资源：谁知道更多规则谁就拥有权力"

[craft.protagonist]
identity_hint = "常见起点：普通人/规则敏感者/前世记忆者"
motivation_hint = "近期：存活 → 中期：掌握规则 → 长期：打破规则/揭示真相"
arc_hint = "从恐惧到理解，从被动遵守到主动利用规则"

[craft.civilization_norms]
count = 5
prompt_hint = "规则怪谈世界中不言自明的规则：不要相信表象、规则会变化、好奇心致命"

[prohibitions]
items = ["恐怖源头过早完全暴露（未知才恐怖）", "主角无脑刚正面解决一切", "用打脸/升级等爽文套路替代恐怖氛围", "恐怖元素与日常场景割裂", "角色面对恐怖事件完全不害怕", "用大量血腥描写替代心理恐惧"]

[craft.golden_three]
chapter_1_structure = "闯入诡境→规则现身→违规恐惧→致命钩子"
chapter_1_rules = [
    "开篇直接把主角抛入一个封闭诡异场景（值夜班/入住怪楼/接手怪岗），禁止日常铺垫和背景介绍",
    "前300字内必须出现第一条'规则'（纸条/广播/告示/前辈叮嘱），规则要具体、有歧义、暗藏杀机",
    "本章必须发生一次'违规即死'的示范：他人或环境展示违反规则的可怕后果，把恐惧具象化，不能只靠氛围渲染",
    "主角人设用应对危机的方式立住（冷静观察型/胆小求生型/多疑推理型择一），让读者代入",
    "诡异感来自'规则的反常识'而非血腥描写——正常行为致死、反常行为求生，制造认知错位",
    "章末抛出一条自相矛盾或无法解释的规则，让读者和主角一起脊背发凉、急于知道真相",
]
chapter_2_structure = "规则试探→隐藏机制→矛盾浮现→反转钩子"
chapter_2_rules = [
    "主角开始主动试探规则边界，用一次具体的验证展示规则的运作逻辑（付出小代价换取信息）",
    "揭示规则背后隐藏的机制或例外（某条规则有隐藏前提/两条规则会冲突），给读者'原来如此'的解谜快感",
    "通过与其他幸存者/NPC的互动补充信息，但要埋下'谁可信谁是伪装'的猜疑",
    "叠加时间压力或资源限制（天亮才能离开/道具只剩一次/安全区在缩小），让恐惧升级",
    "至少制造一次'规则理解错误险些致命'的惊险，强化规则的致命性与主角的成长",
    "章末揭示一条与已知规则相互矛盾的新规则，把悬念推向'到底该信哪条'的两难",
]
chapter_3_structure = "规则死局→破局爽点→更深真相→追读钩子"
chapter_3_rules = [
    "本章必须交付一个解谜爽点：主角靠推理识破规则陷阱、或利用规则漏洞反杀威胁，写出化险为夷的智力快感",
    "破局要有铺垫——先把主角逼入看似必死的规则死局，再让他用前两章埋下的线索翻盘，禁止靠运气或主角光环",
    "每800字设置一个恐惧或紧张爆点（诡异显形/规则失效/同伴异变），维持窒息感节奏",
    "破局后立刻揭示更深的真相或更大的诡异（这栋楼只是开始/规则制定者现身/主角身份存疑），让恐惧升级而非解除",
    "章末用信息差收尾：读者或主角发现一个被忽略的致命细节，制造'必须立刻看下一章'的战栗感",
]

[audit]
dimensions = [1, 2, 3, 6, 7, 8, 9, 10, 13, 14, 15, 16, 17, 18, 19, 24, 25, 26]
