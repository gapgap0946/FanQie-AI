<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0d1117">
<title>Fanqie — 爽文AI创作引擎</title>
<style>
:root {
  color-scheme: dark;
  --bg: #0d1117; --bg2: #161b22; --bg3: #21262d; --border: #30363d;
  --text: #c9d1d9; --text2: #8b949e; --accent: #58a6ff;
  --green: #3fb950; --yellow: #d2991d; --red: #f85149; --purple: #a371f7;
  --radius: 8px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background:var(--bg); color:var(--text); min-height:100vh; touch-action:manipulation; -webkit-tap-highlight-color:rgba(88,166,255,.2); }
a { color:var(--accent); text-decoration:none; }

/* 可访问性：让语义化按钮在充当卡片/行/标签时不带默认按钮外观 */
.unstyled-btn { font:inherit; color:inherit; text-align:left; background:none; border:none; width:100%; cursor:pointer; }
:focus-visible { outline:2px solid var(--accent); outline-offset:2px; border-radius:4px; }
.visually-hidden { position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0 0 0 0); white-space:nowrap; border:0; }

.app { display:flex; height:100vh; }
.sidebar { width:260px; background:var(--bg2); border-right:1px solid var(--border); display:flex; flex-direction:column; flex-shrink:0; }
.main { flex:1; overflow-y:auto; padding:24px; }
.sidebar-header { padding:16px; border-bottom:1px solid var(--border); }
.sidebar-header h1 { font-size:18px; color:var(--accent); }
.sidebar-header p { font-size:12px; color:var(--text2); margin-top:4px; }
.sidebar-nav { flex:1; overflow-y:auto; padding:8px; }
.sidebar-footer { padding:12px; border-top:1px solid var(--border); }

.btn { display:inline-flex; align-items:center; gap:6px; padding:8px 16px; border-radius:var(--radius); border:1px solid var(--border); background:var(--bg3); color:var(--text); cursor:pointer; font-size:13px; transition:all .15s; }
.btn:hover { background:var(--border); }
.btn-primary { background:var(--accent); color:#fff; border-color:var(--accent); }
.btn-primary:hover { background:#4090e0; }
.btn-green { background:#238636; color:#fff; border-color:#238636; }
.btn-green:hover { background:#2ea043; }
.btn-red { background:#da3633; color:#fff; border-color:#da3633; }
.btn-sm { padding:4px 10px; font-size:12px; }
.btn-block { width:100%; justify-content:center; }
.btn:disabled { opacity:.5; cursor:not-allowed; }

.card { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:16px; margin-bottom:12px; }
.card-header { font-size:14px; font-weight:600; margin-bottom:8px; display:flex; align-items:center; gap:8px; }
.card-body { font-size:13px; color:var(--text2); }

.book-item { display:flex; align-items:center; border-radius:var(--radius); margin-bottom:2px; position:relative; }
.book-item:hover { background:var(--bg3); }
.book-item:hover .book-delete { display:flex; }
.book-item.active { background:var(--bg3); border:1px solid var(--accent); }
.book-select { display:flex; align-items:center; gap:10px; padding:10px 12px; cursor:pointer; transition:background .15s; }
.book-delete { display:none; position:absolute; right:8px; top:50%; transform:translateY(-50%); width:22px; height:22px; border-radius:50%; background:var(--red); color:#fff; border:none; cursor:pointer; font-size:12px; align-items:center; justify-content:center; opacity:.7; }
.book-delete:hover { opacity:1; }
.book-icon { width:32px; height:32px; border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; }
.book-info { flex:1; min-width:0; display:block; }
.book-title { font-size:13px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; display:block; }
.book-meta { font-size:11px; color:var(--text2); display:block; }
.status-dot { width:6px; height:6px; border-radius:50%; display:inline-block; }
.status-ready { background:var(--green); }
.status-writing { background:var(--accent); }
.status-draft { background:var(--yellow); }

.form-group { margin-bottom:12px; }
.form-label { display:block; font-size:12px; color:var(--text2); margin-bottom:4px; }
.form-input, .form-select, .form-textarea { width:100%; padding:8px 12px; background:var(--bg); border:1px solid var(--border); border-radius:var(--radius); color:var(--text); font-size:13px; }
.form-textarea { resize:vertical; min-height:80px; font-family:inherit; }
.form-input:focus, .form-select:focus, .form-textarea:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 2px rgba(88,166,255,.35); }
.form-row { display:flex; gap:12px; }
.form-row > * { flex:1; }

.tabs { display:flex; gap:0; border-bottom:1px solid var(--border); margin-bottom:16px; }
.tab { padding:8px 16px; font-size:13px; cursor:pointer; border:none; border-bottom:2px solid transparent; background:none; color:var(--text2); transition:color .15s, border-color .15s; font-family:inherit; }
.tab:hover { color:var(--text); }
.tab.active { color:var(--accent); border-bottom-color:var(--accent); }

.content-area { max-width:900px; }
.chapter-list { max-height:400px; overflow-y:auto; }
.chapter-row { display:flex; align-items:center; gap:8px; padding:6px 8px; border-radius:4px; cursor:pointer; font-size:13px; width:100%; border:none; background:none; color:inherit; font-family:inherit; text-align:left; content-visibility:auto; contain-intrinsic-size:auto 32px; }
.chapter-row:hover { background:var(--bg3); }
.chapter-num { color:var(--text2); width:50px; flex-shrink:0; font-variant-numeric:tabular-nums; }
.chapter-title-text { flex:1; }
.chapter-words { color:var(--text2); font-size:11px; width:60px; text-align:right; font-variant-numeric:tabular-nums; }
.chapter-score { width:40px; text-align:right; font-size:11px; font-variant-numeric:tabular-nums; }

.story-content { background:var(--bg); border:1px solid var(--border); border-radius:var(--radius); padding:20px; font-size:14px; line-height:1.8; white-space:pre-wrap; max-height:70vh; overflow-y:auto; }
.story-content h1 { font-size:20px; margin-bottom:16px; }
.story-content h2 { font-size:16px; margin:16px 0 8px; color:var(--accent); }
.story-content h3 { font-size:14px; margin:12px 0 6px; }

.loading { display:flex; align-items:center; justify-content:center; padding:40px; color:var(--text2); }
.spinner { width:20px; height:20px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .6s linear infinite; margin-right:8px; }
@keyframes spin { to { transform:rotate(360deg); } }

/* Progress panel */
.progress-panel { position:fixed; bottom:0; right:0; width:380px; max-height:50vh; background:var(--bg2); border:1px solid var(--border); border-radius:12px 12px 0 0; box-shadow:0 -4px 20px rgba(0,0,0,.4); z-index:900; display:none; flex-direction:column; }
.progress-panel.visible { display:flex; }
.progress-header { display:flex; align-items:center; justify-content:space-between; padding:10px 14px; border-bottom:1px solid var(--border); cursor:pointer; }
.progress-header h3, .progress-title { font-size:13px; display:flex; align-items:center; gap:8px; }
.progress-body { flex:1; overflow-y:auto; padding:12px; }
.progress-bar-wrap { background:var(--bg3); border-radius:4px; height:6px; margin:8px 0; overflow:hidden; }
.progress-bar { height:100%; border-radius:4px; transition:width .5s; }
.progress-bar.running { background:linear-gradient(90deg,var(--accent),var(--purple)); animation:shimmer 1.5s infinite; background-size:200% 100%; }
.progress-bar.done { background:var(--green); }
.progress-bar.error { background:var(--red); }
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
.progress-status { font-size:11px; color:var(--text2); display:flex; justify-content:space-between; }
.progress-log { background:var(--bg); border:1px solid var(--border); border-radius:var(--radius); padding:10px; font-family:'Consolas',monospace; font-size:11px; line-height:1.5; max-height:200px; overflow-y:auto; white-space:pre-wrap; color:var(--text2); margin-top:8px; }

.toast { position:fixed; top:16px; right:16px; padding:12px 20px; border-radius:var(--radius); font-size:13px; z-index:1000; animation:slideIn .3s; }
.toast-success { background:#238636; color:#fff; }
.toast-error { background:#da3633; color:#fff; }
.toast-info { background:var(--bg3); color:var(--text); border:1px solid var(--border); }
@keyframes slideIn { from { transform:translateX(100%); opacity:0; } to { transform:translateX(0); opacity:1; } }

.empty { text-align:center; padding:40px; color:var(--text2); }
.empty-icon { font-size:48px; margin-bottom:12px; }

.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.6); display:flex; align-items:center; justify-content:center; z-index:999; }
.modal { background:var(--bg2); border:1px solid var(--border); border-radius:12px; padding:24px; width:90%; max-width:600px; max-height:80vh; overflow-y:auto; overscroll-behavior:contain; }
.modal h2 { font-size:16px; margin-bottom:16px; }
.modal-actions { display:flex; gap:8px; justify-content:flex-end; margin-top:16px; }

::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

@media (max-width:768px) { .sidebar { width:200px; } .main { padding:16px; } .progress-panel { width:100%; right:0; } }

/* ---- Chat Panel ---- */
.chat-panel { width:340px; background:var(--bg2); border-left:1px solid var(--border); display:flex; flex-direction:column; flex-shrink:0; transition:width .25s ease; overflow:hidden; }
.chat-panel.collapsed { width:40px; }
.chat-header { display:flex; align-items:center; justify-content:space-between; padding:12px 14px; border-bottom:1px solid var(--border); cursor:pointer; user-select:none; font-size:14px; font-weight:600; flex-shrink:0; }
.chat-panel.collapsed .chat-header { flex-direction:column; padding:12px 6px; gap:8px; }
.chat-panel.collapsed .chat-header span:first-child { writing-mode:vertical-rl; font-size:13px; }
.chat-messages { flex:1; overflow-y:auto; padding:12px; display:flex; flex-direction:column; gap:4px; }
.chat-panel.collapsed .chat-messages,
.chat-panel.collapsed .chat-input-area { display:none; }
.chat-bubble { max-width:85%; padding:8px 12px; border-radius:12px; font-size:13px; line-height:1.6; word-break:break-word; margin-bottom:8px; }
.chat-bubble.user { align-self:flex-end; background:var(--accent); color:#fff; border-bottom-right-radius:4px; }
.chat-bubble.ai { align-self:flex-start; background:var(--bg3); color:var(--text); border-bottom-left-radius:4px; }
.chat-input-area { display:flex; gap:8px; padding:10px 12px; border-top:1px solid var(--border); flex-shrink:0; }
.chat-input { flex:1; padding:8px 12px; background:var(--bg); border:none; border-radius:var(--radius); color:var(--text); font-size:13px; }
.chat-input:focus { outline:none; box-shadow:0 0 0 2px rgba(88,166,255,.35); }
.chat-send-btn { flex-shrink:0; }

@media (max-width:1024px) {
  .chat-panel { display:none; }
  .chat-panel.mobile-visible { display:flex; position:fixed; top:0; right:0; bottom:0; z-index:950; width:320px; box-shadow:-4px 0 20px rgba(0,0,0,.4); }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration:.001ms !important; animation-iteration-count:1 !important; transition-duration:.001ms !important; }
}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sidebar-header"><h1>🍅 Fanqie</h1><p>爽文AI创作引擎</p></div>
    <nav class="sidebar-nav" id="bookList"><div class="loading"><div class="spinner"></div>加载中…</div></nav>
    <div class="sidebar-footer"><button class="btn btn-primary btn-block btn-sm" onclick="showNewBookModal()">+ 创建新书</button><button class="btn btn-block btn-sm" onclick="showGenreModal()" style="margin-top:6px;">🎭 题材管理</button><button class="btn btn-block btn-sm" onclick="toggleChat()" style="margin-top:6px;">💬 AI 点子王</button><button class="btn btn-block btn-sm" onclick="showLLMConfigModal()" style="margin-top:6px;">⚙️ LLM 配置</button></div>
  </aside>
  <main class="main" id="mainContent"><div class="empty"><div class="empty-icon">📖</div><p>选择一本书或创建新书开始</p></div></main>

  <!-- AI Chat Panel -->
  <div class="chat-panel" id="chatPanel">
    <button type="button" class="chat-header unstyled-btn" onclick="toggleChat()" aria-label="展开或收起 AI 点子王面板" aria-expanded="true" id="chatToggleBtn">
      <span aria-hidden="true">💬 AI 点子王</span>
      <span id="chatToggleIcon" aria-hidden="true">◀</span>
    </button>
    <div class="chat-messages" id="chatMessages" role="log" aria-live="polite">
      <div class="chat-bubble ai">嘿！我是你的创意顾问，专精网文设定和剧情设计。有什么想法想聊聊？</div>
    </div>
    <div class="chat-input-area">
      <label class="visually-hidden" for="chatInput">和 AI 点子王聊聊</label>
      <input class="chat-input" id="chatInput" name="chat-message" autocomplete="off" placeholder="聊聊你的故事想法…" onkeydown="if(event.key==='Enter')sendChat()">
      <button class="btn btn-primary btn-sm chat-send-btn" onclick="sendChat()">发送</button>
    </div>
  </div>
</div>

<!-- Progress Panel -->
<div class="progress-panel" id="progressPanel">
  <button type="button" class="progress-header unstyled-btn" onclick="toggleProgress()" aria-label="展开或收起任务进度面板">
    <span class="progress-title"><span id="progressIcon" aria-hidden="true">⏳</span> <span id="progressLabel">就绪</span></span>
    <span style="font-size:11px;color:var(--text2);" id="progressTime"></span>
  </button>
  <div class="progress-body">
    <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
    <div class="progress-status" aria-live="polite"><span id="progressStatus">等待中…</span><span id="progressPercent">0%</span></div>
    <div class="progress-log" id="progressLog"></div>
  </div>
</div>

<!-- New Book Modal -->
<div class="modal-overlay" id="newBookModal" role="dialog" aria-modal="true" aria-label="创建新书" style="display:none">
  <div class="modal">
    <h2>📝 创建新书</h2>
    <div class="form-group"><label class="form-label" for="newTitle">书名 *</label><input class="form-input" id="newTitle" name="book-title" autocomplete="off" placeholder="输入书名，如「剑破苍穹」…"></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label" for="newGenre">题材</label><select class="form-select" id="newGenre" name="genre"></select></div>
      <div class="form-group"><label class="form-label" for="newWords">每章字数</label><input class="form-input" id="newWords" name="words" type="number" inputmode="numeric" min="500" max="10000" value="2200"></div>
      <div class="form-group"><label class="form-label" for="newChapters">目标章数</label><input class="form-input" id="newChapters" name="chapters" type="number" inputmode="numeric" min="1" max="2000" value="200"></div>
    </div>
    <div class="form-group"><label class="form-label" for="newBrief">创意简报（可选）</label><textarea class="form-textarea" id="newBrief" name="brief" placeholder="描述你的故事创意，如「废柴少年觉醒上古血脉…」…"></textarea></div>
    <div class="modal-actions">
      <button class="btn" onclick="hideNewBookModal()">取消</button>
      <button class="btn btn-primary" id="btnCreate" onclick="createBook()">创建（含Foundation生成）</button>
    </div>
  </div>
</div>

<!-- Write Modal -->
<div class="modal-overlay" id="writeModal" role="dialog" aria-modal="true" aria-label="写章节" style="display:none">
  <div class="modal">
    <h2>✍️ 写章节</h2>
    <div class="form-row">
      <div class="form-group"><label class="form-label" for="writeCount">生成章数</label><input class="form-input" id="writeCount" name="write-count" type="number" inputmode="numeric" value="1" min="1" max="10"></div>
    </div>
    <div class="form-group"><label class="form-label" for="writeInstruction">干预指令（可选）</label><input class="form-input" id="writeInstruction" name="write-instruction" autocomplete="off" placeholder="如：本章重点写战斗场面…"></div>
    <div class="modal-actions">
      <button class="btn" onclick="hideWriteModal()">取消</button>
      <button class="btn btn-green" id="btnWrite" onclick="writeChapter()">开始写作</button>
    </div>
  </div>
</div>

<!-- Advise Modal -->
<div class="modal-overlay" id="adviseModal" role="dialog" aria-modal="true" aria-label="人机协作编辑" style="display:none">
  <div class="modal">
    <h2>🔧 人机协作编辑</h2>
    <div class="form-group"><label class="form-label" for="adviseInstruction">修改意见</label><textarea class="form-textarea" id="adviseInstruction" name="advise-instruction" placeholder="如：把主角的金手指改成…"></textarea></div>
    <div class="modal-actions">
      <button class="btn" onclick="hideAdviseModal()">取消</button>
      <button class="btn btn-primary" id="btnAdvise" onclick="doAdvise()">分析并修改</button>
    </div>
  </div>
</div>

<!-- Genre Modal -->
<div class="modal-overlay" id="genreModal" role="dialog" aria-modal="true" aria-label="题材管理" style="display:none">
  <div class="modal" style="max-width:700px;">
    <h2>🎭 题材管理</h2>
    <div style="display:flex;gap:12px;">
      <div style="flex:1;">
        <label class="form-label" for="genreSelect">现有题材</label>
        <select class="form-select" id="genreSelect" name="genre-select" size="8" onchange="loadGenreDetail()" style="height:auto;"></select>
      </div>
      <div style="flex:2;">
        <div class="form-label">创建新题材</div>
        <div class="form-row">
          <div class="form-group"><label class="visually-hidden" for="newGenreId">题材 ID</label><input class="form-input" id="newGenreId" name="genre-id" autocomplete="off" spellcheck="false" placeholder="题材ID（英文）"></div>
          <div class="form-group"><label class="visually-hidden" for="newGenreBase">基础模板</label><select class="form-select" id="newGenreBase" name="genre-base"></select></div>
        </div>
        <div class="form-group"><label class="form-label" for="newGenreToml">TOML 配置（可选，留空则复制基础模板）</label><textarea class="form-textarea" id="newGenreToml" name="genre-toml" spellcheck="false" placeholder="留空则基于所选模板创建…" style="min-height:200px;font-family:Consolas,monospace;font-size:11px;"></textarea></div>
        <button class="btn btn-primary btn-sm" onclick="createGenre()">创建题材</button>
      </div>
    </div>
    <div class="modal-actions"><button class="btn" onclick="hideGenreModal()">关闭</button></div>
  </div>
</div>

<!-- LLM Config Modal -->
<div class="modal-overlay" id="llmConfigModal" role="dialog" aria-modal="true" aria-label="LLM 配置" style="display:none">
  <div class="modal" style="max-width:500px;">
    <h2>⚙️ LLM 配置</h2>
    <div class="form-group"><label class="form-label" for="llmBaseUrl">API 地址 (Base URL)</label><input class="form-input" id="llmBaseUrl" name="llm-base-url" type="url" autocomplete="off" spellcheck="false" placeholder="https://api.openai.com/v1"></div>
    <div class="form-group"><label class="form-label" for="llmApiKey">API Key</label><input class="form-input" id="llmApiKey" name="llm-api-key" type="password" autocomplete="off" spellcheck="false" placeholder="sk-…"></div>
    <div class="form-group"><label class="form-label" for="llmModel">模型名称</label><input class="form-input" id="llmModel" name="llm-model" autocomplete="off" spellcheck="false" placeholder="gpt-4o"></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label" for="llmTemperature">Temperature</label><input class="form-input" id="llmTemperature" name="llm-temperature" type="number" inputmode="decimal" step="0.1" min="0" max="2" placeholder="0.7"></div>
      <div class="form-group"><label class="form-label" for="llmMaxTokens">Max Tokens</label><input class="form-input" id="llmMaxTokens" name="llm-max-tokens" type="number" inputmode="numeric" step="100" min="100" max="128000" placeholder="4096"></div>
    </div>
    <p style="font-size:11px;color:var(--text2);margin-bottom:12px;">⚠️ 保存后需重启 Web 服务生效</p>
    <div class="modal-actions">
      <button class="btn" onclick="hideLLMConfigModal()">取消</button>
      <button class="btn btn-primary" id="btnSaveLLM" onclick="saveLLMConfig()">保存配置</button>
    </div>
  </div>
</div>

<div id="toastContainer" aria-live="polite" aria-atomic="true"></div>

<script>
const API = 'http://127.0.0.1:8765';
let currentBookId = null, currentTab = 'overview';
let pollTimer = null, taskLabel = '';

// ---- Init ----
async function init() { await loadBooks(); await loadGenres(); }
init();

// ---- Books ----
async function loadBooks() {
  try {
    const res = await fetch(API + '/api/books');
    const books = await res.json();
    renderBookList(books);
  } catch(e) {
    document.getElementById('bookList').innerHTML = '<div class="loading">连接服务器失败</div>';
  }
}

function renderBookList(books) {
  const el = document.getElementById('bookList');
  if (!books.length) { el.innerHTML = '<div class="empty"><div class="empty-icon">📚</div><p>暂无书籍</p></div>'; return; }
  el.innerHTML = books.map(b => {
    const sc = b.status==='ready'?'status-ready':b.status==='writing'?'status-writing':'status-draft';
    const icon = {'cthulhu_cultivation':'🐙','xuanhuan':'⚔️','apocalypse':'🧟','mass_isekai':'🌐','rule_horror':'👻','weird_descend':'🌀'}[b.genre_id]||'📖';
    return `<div class="book-item${b.id===currentBookId?' active':''}">
      <button type="button" class="unstyled-btn book-select" onclick="selectBook('${b.id}')" aria-label="打开《${esc(b.title)}》">
        <span class="book-icon" aria-hidden="true">${icon}</span>
        <span class="book-info">
          <span class="book-title">${esc(b.title)}</span>
          <span class="book-meta"><span class="status-dot ${sc}"></span> ${b.chapters}/${b.target_chapters}章 · ${b.genre_id}</span>
        </span>
      </button>
      <button type="button" class="book-delete" onclick="event.stopPropagation();deleteBook('${b.id}','${esc(b.title).replace(/'/g,"\\'")}')" aria-label="删除《${esc(b.title)}》">×</button>
    </div>`;
  }).join('');
}

async function selectBook(id) { currentBookId = id; await loadBooks(); await loadBookDetail(); }

async function loadBookDetail() {
  if (!currentBookId) return;
  try {
    const res = await fetch(API + '/api/book?id=' + currentBookId);
    const book = await res.json();
    renderMain(book);
  } catch(e) { toast('加载失败', 'error'); }
}

async function loadGenres() {
  try {
    const res = await fetch(API + '/api/genres');
    const genres = await res.json();
    document.getElementById('newGenre').innerHTML = genres.map(g => `<option value="${g.id}">${g.name} (${g.id})</option>`).join('');

// ---- Main Content ----
function renderMain(book) {
  const main = document.getElementById('mainContent');
  const progress = book.target_chapters > 0 ? (book.chapters / book.target_chapters * 100).toFixed(1) : 0;
  const sl = {draft:'草稿',ready:'就绪',writing:'写作中',paused:'暂停',completed:'已完成'}[book.status]||book.status;
  main.innerHTML = `
    <div class="content-area">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;">
        <h2 style="font-size:20px;">${esc(book.title)}</h2>
        <span style="font-size:12px;color:var(--text2);">${sl} · ${book.genre_id}</span>
      </div>
      <div class="tabs" role="tablist">
        <button type="button" role="tab" class="tab${currentTab==='overview'?' active':''}" aria-selected="${currentTab==='overview'}" onclick="switchTab('overview')">概览</button>
        <button type="button" role="tab" class="tab${currentTab==='chapters'?' active':''}" aria-selected="${currentTab==='chapters'}" onclick="switchTab('chapters')">章节 (${book.chapters})</button>
        <button type="button" role="tab" class="tab${currentTab==='story'?' active':''}" aria-selected="${currentTab==='story'}" onclick="switchTab('story')">设定</button>
      </div>
      <div id="tabContent"></div>
    </div>`;
  switchTab(currentTab);
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.tab:nth-child(${tab==='overview'?1:tab==='chapters'?2:3})`)?.classList.add('active');
  if (tab === 'overview') renderOverview();
  else if (tab === 'chapters') renderChapters();
  else if (tab === 'story') renderStory();
}

// ---- Progress Panel ----
function showProgress(label) {
  taskLabel = label;
  const panel = document.getElementById('progressPanel');
  panel.classList.add('visible');
  document.getElementById('progressLabel').textContent = label;
  document.getElementById('progressIcon').textContent = '⏳';
  document.getElementById('progressStatus').textContent = '启动中…';
  document.getElementById('progressPercent').textContent = '0%';
  document.getElementById('progressTime').textContent = '';
  document.getElementById('progressLog').textContent = '';
  const bar = document.getElementById('progressBar');
  bar.style.width = '5%';
  bar.className = 'progress-bar running';
}

function updateProgress(task) {
  const bar = document.getElementById('progressBar');
  const elapsed = task.started_at ? Math.floor((Date.now()/1000) - task.started_at) : 0;

  if (task.status === 'done') {
    bar.style.width = '100%';
    bar.className = 'progress-bar done';
    document.getElementById('progressIcon').textContent = '✅';
    document.getElementById('progressStatus').textContent = '完成！';
    document.getElementById('progressPercent').textContent = '100%';
    document.getElementById('progressTime').textContent = `耗时 ${elapsed}s`;
    stopPolling();
    setTimeout(() => { loadBooks(); if(currentBookId) loadBookDetail(); }, 500);
  } else if (task.status === 'error' || task.status === 'timeout') {
    bar.className = 'progress-bar error';
    document.getElementById('progressIcon').textContent = '❌';
    document.getElementById('progressStatus').textContent = task.status === 'timeout' ? '超时' : '出错';
    document.getElementById('progressTime').textContent = `耗时 ${elapsed}s`;
    stopPolling();
  } else if (task.status === 'running') {
    // 根据输出行数估算进度
    const lines = task.lines || 0;
    const pct = Math.min(95, Math.max(5, lines * 3));
    bar.style.width = pct + '%';
    document.getElementById('progressStatus').textContent = '运行中…';
    document.getElementById('progressPercent').textContent = pct + '%';
    document.getElementById('progressTime').textContent = `${elapsed}s`;
  }
  // 更新日志
  if (task.output) {
    const logEl = document.getElementById('progressLog');
    logEl.textContent = task.output;
    logEl.scrollTop = logEl.scrollHeight;
  }
}

function toggleProgress() {
  document.getElementById('progressPanel').classList.toggle('minimized');
}

function stopPolling() {
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
}

async function pollTask(taskId) {
  stopPolling();
  pollTimer = setInterval(async () => {
    try {
      const res = await fetch(API + '/api/task?id=' + taskId);
      const task = await res.json();
      updateProgress(task);
      if (task.status === 'done' || task.status === 'error' || task.status === 'timeout') {
        stopPolling();
        if (task.status === 'done') toast(taskLabel + ' 完成！', 'success');
        else toast(taskLabel + ' 失败', 'error');
      }
    } catch(e) {}
  }, 1000);
}

function hideNewBookModal() { document.getElementById('newBookModal').style.display = 'none'; }

async function createBook() {

  const btn = document.getElementById('btnCreate');
  btn.disabled = true; btn.textContent = '提交中…';
  hideNewBookModal();

  try {
    const res = await fetch(API + '/api/new', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        title, genre_id: document.getElementById('newGenre').value,
        words: parseInt(document.getElementById('newWords').value)||2200,
        chapters: parseInt(document.getElementById('newChapters').value)||200,

async function deleteBook(id, title) {
  const name = title || id;
  if (!confirm('确定要删除《' + name + '》吗？\n此操作不可恢复！')) return;
  try {
    const res = await fetch(API + '/api/delete', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ id: id })
    });
    const data = await res.json();
    if (data.success) {
      toast('已删除《' + name + '》', 'success');
      if (currentBookId === id) {
        currentBookId = null;
        document.getElementById('mainContent').innerHTML = '<div class="empty"><div class="empty-icon">📖</div><p>选择一本书或创建新书开始</p></div>';

      await loadBooks();
    } else {
      toast('删除失败: ' + (data.error||''), 'error');
    }
  } catch(e) { toast('请求失败', 'error'); }
}

// ---- Utils ----
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function toast(msg, type) {
  const container = document.getElementById('toastContainer');
  const el = document.createElement('div');
  el.className = 'toast toast-' + (type||'info');
  el.textContent = msg;
  container.appendChild(el);
  setTimeout(() => el.remove(), 5000);
}

// ---- Chat ----
function toggleChat() {
  const panel = document.getElementById('chatPanel');
  const icon = document.getElementById('chatToggleIcon');
  const btn = document.getElementById('chatToggleBtn');
  if (window.innerWidth <= 1024) {
    const visible = panel.classList.toggle('mobile-visible');
    btn.setAttribute('aria-expanded', String(visible));
  } else {
    const collapsed = panel.classList.toggle('collapsed');
    icon.textContent = collapsed ? '▶' : '◀';
    btn.setAttribute('aria-expanded', String(!collapsed));
  }
}

async function sendChat() {
  const input = document.getElementById('chatInput');
  const message = input.value.trim();
  if (!message) return;

  renderChatBubble(message, 'user');
  input.value = '';

  try {
    const res = await fetch(API + '/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message })
    });
    const data = await res.json();
    if (data.reply) {
      renderChatBubble(data.reply, 'ai');
    } else {
      renderChatBubble('抱歉，出错了: ' + (data.error || '未知错误'), 'ai');
    }
  } catch (e) {
    renderChatBubble('网络请求失败: ' + e.message, 'ai');
  }
}

async function loadChatHistory() {
  try {
    const res = await fetch(API + '/api/chat/history');
    const history = await res.json();
    if (Array.isArray(history) && history.length > 0) {
      const msgs = document.getElementById('chatMessages');
      msgs.innerHTML = '';
      for (const entry of history) {
        const role = entry.role === 'assistant' ? 'ai' : 'user';
        renderChatBubble(entry.content, role);
      }
    }
  } catch (e) { /* ignore */ }
}

function renderChatBubble(text, role) {
  const msgs = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = 'chat-bubble ' + role;
  div.textContent = text;
  msgs.appendChild(div);
  scrollChatToBottom();
}

function scrollChatToBottom() {
  const msgs = document.getElementById('chatMessages');
  msgs.scrollTop = msgs.scrollHeight;
}

// Load chat history on init
loadChatHistory();

// ---- Modal 可访问性增强：Escape 关闭 + 点击遮罩关闭 ----
function closeTopModal() {
  const open = [...document.querySelectorAll('.modal-overlay')].filter(m => m.style.display === 'flex');
  if (open.length) { open[open.length - 1].style.display = 'none'; return true; }
  return false;
}
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeTopModal();
});
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('mousedown', (e) => {
    if (e.target === overlay) overlay.style.display = 'none';
  });
});
